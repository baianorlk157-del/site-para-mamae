<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para minha mamãe 💖</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: white;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      max-width: 400px;
      margin: 0 auto 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4d6d;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ffe3ea;
    }

    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: -1;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="hearts"></div>

  <div class="container">
  <h1>Eu te amo, mamãe 💖</h1>

  <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:20px 0;">
    <img src="foto1.jpg" style="width:150px; border-radius:15px;">
    <img src="foto2.jpg" style="width:150px; border-radius:15px;">
    <img src="foto3.jpg" style="width:150px; border-radius:15px;">
  </div>

  <p>
    Você é minha inspiração, meu carinho e minha força.<br>
    Obrigado por sempre cuidar de mim 💕
  </p>

  <button onclick="mensagem()">Clique para uma surpresa</button>
</div>

    <button onclick="mensagem()">Clique para uma surpresa</button>
  </div>

  <script>
    function mensagem() {
      alert("Mamãe, eu te amo mais do que tudo nesse mundo 💖");
    }

    // Criar corações subindo
    const container = document.querySelector(".hearts");

    function criarCoracao() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "💖";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";

      container.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(criarCoracao, 300);
  </script>

</body>
</html>
